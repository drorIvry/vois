name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version
          swift --version

      - name: Download Metal Toolchain (Xcode 26+)
        run: xcodebuild -downloadComponent MetalToolchain || true

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build/xcode/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build -scheme Vois -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath .build/xcode -quiet 2>&1 | scripts/ci-log-filter.sh

      - name: Unit tests
        run: |
          set -o pipefail
          xcodebuild test -scheme Vois \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath .build/xcode -quiet 2>&1 | scripts/ci-log-filter.sh

      - name: Shellcheck scripts
        run: |
          brew install shellcheck >/dev/null 2>&1 || true
          shellcheck scripts/*.sh || true
